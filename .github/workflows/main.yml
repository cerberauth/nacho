name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v7

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Run linter 👀
        run: npm run lint

      - uses: actions/cache@v6
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Run tests 🧪
        run: npm run build
        env:
          NODE_ENV: production

  validate-json:
    runs-on: ubuntu-latest
    name: Validate ${{ matrix.name }} JSON

    strategy:
      fail-fast: true
      matrix:
        include:
          - name: OpenID Connect Providers
            files: "data/openid/providers/*.json"
          - name: OpenID Connect Applications
            files: "data/templates/*.json"
            schema: https://schemas.cerberauth.com/templates/draft/2024-09/application.schema.json

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v7

      - name: Validate JSON
        uses: emmanuelgautier/validate-json@v2
        with:
          files: ${{ matrix.files }}
          schema: ${{ matrix.schema }}
